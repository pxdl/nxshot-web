<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>html{background-color:#fafaf9}html.dark{background-color:#0d1117}</style>
    <script>
      (function(){
        var s=localStorage.getItem("theme");
        if(s==="dark"||(!s&&matchMedia("(prefers-color-scheme:dark)").matches))
          document.documentElement.classList.add("dark");
      })();
    </script>
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NXShot organizes your Nintendo Switch screenshots and videos by game with correct dates preserved. Select your Album folder, pick your games, and download a tidy ZIP. Free, open-source, and runs entirely in your browser." />
    <title>nxshot - Nintendo Switch Screenshot Organizer</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.nxshot.com/" />
    <meta property="og:title" content="nxshot - Nintendo Switch Screenshot Organizer" />
    <meta property="og:description" content="Organize your Nintendo Switch screenshots and videos by game with correct dates. Free, open-source, runs in your browser." />
    <meta property="og:image" content="https://www.nxshot.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.nxshot.com/og-image.png" />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "nxshot",
      "url": "https://www.nxshot.com",
      "description": "Organize your Nintendo Switch screenshots and videos by game with correct dates preserved. Select your Album folder, pick your games, and download a tidy ZIP.",
      "applicationCategory": "UtilityApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires a Chromium-based browser (Chrome, Edge, Opera) for full functionality",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "pxdl",
        "url": "https://github.com/pxdl"
      },
      "license": "https://opensource.org/licenses/MIT",
      "image": "https://www.nxshot.com/og-image.png",
      "sameAs": "https://github.com/pxdl/nxshot-web"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does nxshot organize Nintendo Switch screenshots?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "nxshot scans your SD card's Album folder, identifies screenshots and videos by their filename pattern, extracts the game title and timestamp, then lets you download them as a ZIP organized into folders by game with correct dates preserved."
          }
        },
        {
          "@type": "Question",
          "name": "Is nxshot free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, nxshot is completely free and open-source. It runs entirely in your browser — no installation, no uploads, no account required."
          }
        },
        {
          "@type": "Question",
          "name": "Does nxshot upload my screenshots anywhere?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. nxshot runs entirely client-side in your browser. Your files never leave your computer."
          }
        },
        {
          "@type": "Question",
          "name": "Which browsers are supported?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "nxshot works best in Chromium-based browsers (Chrome, Edge, Opera) which support the File System Access API for reliable folder reading. Firefox and Safari are supported with limited functionality."
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=JetBrains+Mono&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=JetBrains+Mono&display=swap" rel="stylesheet"></noscript>
  </head>
  <!-- Keep theme key/values in sync with STORAGE_KEYS and THEME in src/constants.ts -->
  <body class="bg-stone-50 dark:bg-[#0d1117]">
    <!-- App shell: fixed overlay that paints before JS loads, removed on React mount -->
    <div id="app-shell" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column">
      <div style="height:4px;background:linear-gradient(to right,transparent,#e60012,transparent);flex-shrink:0"></div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem">
        <div style="text-align:center">
          <div style="display:flex;align-items:baseline;justify-content:center;gap:.625rem;margin-bottom:.75rem">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#e60012" style="width:2.5rem;height:2.5rem;transform:translateY(3px)" aria-hidden="true"><path d="M12 9a3.75 3.75 0 1 0 0 7.5A3.75 3.75 0 0 0 12 9Z"/><path fill-rule="evenodd" d="M9.344 3.071a49.52 49.52 0 0 1 5.312 0c.967.052 1.83.585 2.332 1.39l.821 1.317c.24.383.645.643 1.11.71.386.054.77.113 1.152.177 1.432.239 2.429 1.493 2.429 2.909V18a3 3 0 0 1-3 3H4.5a3 3 0 0 1-3-3V9.574c0-1.416.997-2.67 2.429-2.909.382-.064.766-.123 1.151-.178a1.56 1.56 0 0 0 1.11-.71l.822-1.315a2.942 2.942 0 0 1 2.332-1.39ZM6.75 12.75a5.25 5.25 0 1 1 10.5 0 5.25 5.25 0 0 1-10.5 0Zm12-1.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" clip-rule="evenodd"/></svg>
            <h1 style="font-size:clamp(3rem,5vw,4.5rem);font-family:'Bricolage Grotesque',system-ui,sans-serif;font-weight:800;letter-spacing:-.025em;line-height:1;margin:0"><span style="color:#e60012">nx</span><span id="shell-shot" style="color:#1c1917">shot</span></h1>
          </div>
          <p id="shell-sub" style="font-size:clamp(1.125rem,2vw,1.25rem);color:#78716c;font-weight:500;letter-spacing:-.025em;font-family:'Albert Sans',system-ui,sans-serif;margin:0">Organize your Nintendo Switch screenshots</p>
        </div>
      </div>
    </div>
    <style>
      #app-shell{background:#fafaf9}
      .dark #app-shell{background:#0d1117}
      .dark #shell-shot{color:#fff!important}
      .dark #shell-sub{color:#94a3b8!important}
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
